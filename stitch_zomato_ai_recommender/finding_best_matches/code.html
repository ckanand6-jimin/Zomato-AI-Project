<style>
        .spin-slow {
            animation: spin 3s linear infinite;
        }
        .pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-soft {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: .7;
                transform: scale(0.98);
            }
        }
        
        .loading-dot {
            animation: blink 1.4s infinite both;
        }
        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>

<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">

<!-- Ambient Background Effect -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[radial-gradient(circle_at_center,var(--tw-colors-primary-container)_0%,transparent_70%)] mix-blend-multiply blur-3xl"></div>

<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Outer decorative ring -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-low"></div>
<!-- Spinning ring -->
<div class="absolute inset-0 rounded-full border-4 border-transparent border-t-primary border-r-primary-container spin-slow shadow-sm"></div>
<!-- Central Icon -->
<div class="bg-surface-white rounded-full w-24 h-24 flex items-center justify-center shadow-lg pulse-soft relative z-10 border border-outline-variant/30">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="restaurant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-3">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">
                    Generating personalized recommendations<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mx-auto">
                    Filtering restaurants and consulting AI (usually 2–8 seconds)
                </p>
</div>
<!-- Minimal progress indicator -->
<div class="w-full max-w-[200px] h-1.5 bg-surface-container-low rounded-full overflow-hidden mt-4">
<div class="h-full bg-primary-container rounded-full w-1/3 animate-[pulse_2s_ease-in-out_infinite]" style="animation: indeterminate 2s ease-in-out infinite;"></div>
</div>
<style>
                @keyframes indeterminate {
                    0% { transform: translateX(-100%) scaleX(0.2); }
                    50% { transform: translateX(0%) scaleX(0.5); }
                    100% { transform: translateX(200%) scaleX(0.2); }
                }
            </style>
</div>
